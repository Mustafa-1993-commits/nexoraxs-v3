<html lang="en">
<head>
<meta charset="UTF-8" />

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --cyan: #06b6d4;
  }
  html, body { background: var(--bg); color: #e5e7eb; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  ::selection { background: rgba(139,92,246,0.4); color: #fff; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #374151; }

  .gradient-text {
    background: linear-gradient(120deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* Glow blobs */
  .glow-blob {
    position: absolute; border-radius: 9999px; filter: blur(120px);
    pointer-events: none; z-index: 0;
  }

  /* Glass */
  .glass {
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  /* Grid */
  .grid-bg {
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* Animations */
  @keyframes float-y { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-14px) } }
  @keyframes float-y-rev { 0%,100% { transform: translateY(0) } 50% { transform: translateY(14px) } }
  @keyframes float-soft { 0%,100% { transform: translateY(0) translateX(0) } 50% { transform: translateY(-8px) translateX(4px) } }
  @keyframes pulse-ring {
    0% { transform: scale(0.85); opacity: 0.55; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  @keyframes dash-flow { to { stroke-dashoffset: -40; } }
  @keyframes orbit-rotate { to { transform: rotate(360deg); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes blob-drift {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-20px) scale(1.05); }
    66% { transform: translate(-20px,30px) scale(0.95); }
  }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .blob-drift-1 { animation: blob-drift 18s ease-in-out infinite; }
  .blob-drift-2 { animation: blob-drift 22s ease-in-out infinite reverse; }
  .blob-drift-3 { animation: blob-drift 26s ease-in-out infinite; }

  /* Marquee */
  .marquee-track { display: flex; width: max-content; animation: marquee 50s linear infinite; }
  .marquee-mask {
    mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
    -webkit-mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
  }

  /* 3D tilt cards */
  .tilt {
    transform-style: preserve-3d;
    transition: transform .35s cubic-bezier(.2,.7,.3,1), border-color .35s ease, background-color .35s ease, box-shadow .35s ease;
    will-change: transform;
  }
  .tilt:hover { border-color: rgba(255,255,255,0.18); background-color: rgba(255,255,255,0.05); box-shadow: 0 30px 80px -30px rgba(59,130,246,0.25); }
  .tilt-inner { transform: translateZ(40px); }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.2,.7,.3,1), transform .9s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: .1s; }
  .reveal.delay-2 { transition-delay: .2s; }
  .reveal.delay-3 { transition-delay: .3s; }

  /* Primary button */
  .btn-primary {
    position: relative;
    background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
    box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.6), inset 0 1px 0 rgba(255,255,255,0.18);
    transition: transform .2s ease, box-shadow .2s ease;
    overflow: hidden;
  }
  .btn-primary::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform .6s ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 16px 40px -10px rgba(59, 130, 246, 0.85), inset 0 1px 0 rgba(255,255,255,0.25); }
  .btn-primary:hover::after { transform: translateX(100%); }

  /* Glow border (gradient ring) */
  .glow-border { position: relative; }
  .glow-border::before {
    content: ''; position: absolute; inset: 0;
    border-radius: inherit; padding: 1px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }

  /* FAQ */
  .faq-icon { transition: transform .25s ease; }
  .faq-open .faq-icon { transform: rotate(180deg); }

  /* Shimmer text */
  .shimmer {
    background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,1) 50%, rgba(255,255,255,0.4));
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shimmer 3s linear infinite;
  }

  /* Connector */
  .connector { stroke-dasharray: 6 6; animation: dash-flow 2s linear infinite; }

  /* Hero perspective wrapper */
  .scene { perspective: 1200px; perspective-origin: center 35%; }

  .chip { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }

  /* Noise overlay (very subtle) */
  .noise::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none; opacity: 0.4;

<body class="bg-[#0a0a0f] text-gray-200">

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

// ---------------- Icon ----------------
const Icon = ({ name, className = "w-5 h-5", strokeWidth = 1.8 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const def = window.lucide.icons[name] || window.lucide.icons.Circle;
      const svg = window.lucide.createElement(def);
      svg.setAttribute('stroke-width', strokeWidth);
      svg.classList.add(...className.split(' ').filter(Boolean));
      ref.current.appendChild(svg);
    }
  }, [name, className, strokeWidth]);
  return <span ref={ref} className="inline-flex"></span>;
};

// ---------------- Logo ----------------
const Logo = () => (
  <a href="#" className="flex items-center gap-2.5 group">
    <div className="relative w-8 h-8 rounded-lg overflow-hidden" style={{ background: 'linear-gradient(135deg,#3b82f6,#8b5cf6 50%,#06b6d4)' }}>
      <div className="absolute inset-[1.5px] rounded-[6px] bg-[#0a0a0f] flex items-center justify-center">
        <div className="w-3.5 h-3.5 rounded-sm" style={{ background: 'linear-gradient(135deg,#3b82f6,#8b5cf6,#06b6d4)' }}></div>
      </div>
    </div>
    <span className="text-lg font-bold tracking-tight text-white">Nexora<span className="gradient-text">XS</span></span>
  </a>
);

// ---------------- 3D Tilt Hook ----------------
const useTilt = (max = 8) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      el.style.transform = `perspective(900px) rotateX(${-y * max}deg) rotateY(${x * max}deg) translateZ(0)`;
    };
    const onLeave = () => { el.style.transform = 'perspective(900px) rotateX(0) rotateY(0) translateZ(0)'; };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
  }, [max]);
  return ref;
};

// ---------------- Mouse Parallax (small drift) ----------------
const useParallax = (strength = 12) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    let raf;
    const onMove = (e) => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        const x = (e.clientX / window.innerWidth - 0.5) * strength;
        const y = (e.clientY / window.innerHeight - 0.5) * strength;
        el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      });
    };
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, [strength]);
  return ref;
};

// ---------------- Glow blobs background ----------------
const GlowField = () => (
  <>
    <div className="glow-blob blob-drift-1" style={{ width: 620, height: 620, background: '#3b82f6', opacity: 0.25, top: -180, left: -120 }} />
    <div className="glow-blob blob-drift-2" style={{ width: 520, height: 520, background: '#8b5cf6', opacity: 0.22, top: 240, right: -160 }} />
    <div className="glow-blob blob-drift-3" style={{ width: 420, height: 420, background: '#06b6d4', opacity: 0.20, top: 720, left: '40%' }} />
  </>
);

// ---------------- Navbar ----------------
const Navbar = () => {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const links = ['Platform','Apps','Pricing','FAQ'];
  return (
    <header className={`fixed top-0 inset-x-0 z-50 transition-all duration-300`}>
      <div className={`max-w-7xl mx-auto px-6 lg:px-8 mt-3 ${scrolled ? '' : ''}`}>
        <nav className={`flex items-center justify-between h-14 rounded-2xl px-4 transition-all duration-300 ${scrolled ? 'glass shadow-[0_20px_60px_-20px_rgba(0,0,0,0.6)]' : ''}`}>
          <Logo />
          <div className="hidden md:flex items-center gap-1 absolute left-1/2 -translate-x-1/2">
            {links.map(l => (
              <a key={l} href={`#${l.toLowerCase()}`} className="px-4 py-2 text-sm text-gray-400 hover:text-white transition-colors">{l}</a>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <a href="#" className="hidden sm:inline-flex text-sm text-gray-300 hover:text-white px-3 py-1.5 rounded-lg hover:bg-white/5 transition-colors">Sign in</a>
            <a href="#" className="btn-primary inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium text-white">
              Get Started <Icon name="ArrowRight" className="w-4 h-4" />
            </a>
            <button className="md:hidden text-gray-300 p-2" onClick={() => setMobileOpen(o => !o)}>
              <Icon name={mobileOpen ? 'X' : 'Menu'} className="w-5 h-5" />
            </button>
          </div>
        </nav>
        {mobileOpen && (
          <div className="md:hidden mt-2 glass rounded-2xl p-3 flex flex-col gap-1">
            {links.map(l => <a key={l} href={`#${l.toLowerCase()}`} onClick={() => setMobileOpen(false)} className="px-3 py-2 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white">{l}</a>)}
          </div>
        )}
      </div>
    </header>
  );
};

// ---------------- Hero ----------------

    { name: 'Clinics',     icon: 'Stethoscope',     color: '#10b981', pos: { top: '4%',  right: '8%' }, delay: '0.4s', anim: 'float-y-rev' },

    { name: 'CRM',         icon: 'Users',           color: '#06b6d4', pos: { bottom: '10%', right: '6%' }, delay: '1.2s', anim: 'float-y' },

          <defs>

            <linearGradient id="conn-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.8" />

          </defs>
          <g style={{ transformOrigin: '200px 200px', animation: 'orbit-rotate 60s linear infinite' }}>

          </g>
          <g style={{ transformOrigin: '200px 200px', animation: 'orbit-rotate 90s linear infinite reverse' }}>
            <circle cx="200" cy="200" r="185" stroke="rgba(255,255,255,0.05)" strokeWidth="1" strokeDasharray="3 12" />

        {/* Diagonal connectors to corners */}

          <line x1="200" y1="200" x2="322" y2="78"  stroke="url(#conn-grad)" strokeWidth="1.5" className="connector" />
          <line x1="200" y1="200" x2="78"  y2="322" stroke="url(#conn-grad)" strokeWidth="1.5" className="connector" />

        {/* Pulse rings */}
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-52 h-52 rounded-full" style={{ background: 'radial-gradient(circle, rgba(139,92,246,0.35), transparent 65%)' }}></div>
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-44 h-44 rounded-full border border-purple-500/30" style={{ animation: 'pulse-ring 3.4s ease-out infinite' }}></div>
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-44 h-44 rounded-full border border-blue-500/30" style={{ animation: 'pulse-ring 3.4s ease-out 1.1s infinite' }}></div>
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-44 h-44 rounded-full border border-cyan-500/30" style={{ animation: 'pulse-ring 3.4s ease-out 2.2s infinite' }}></div>

// ---------------- Trust Marquee ----------------
const TrustMarquee = () => {
  const partners = ['WhatsApp','Twilio','Stripe','Google','Meta','Cloudflare','Laravel','Next.js','Vercel'];
  const items = [...partners, ...partners];
  return (
    <section className="relative py-14 border-y border-white/5">
      <div className="max-w-7xl mx-auto px-6 lg:px-8">
        <p className="text-center chip text-gray-500 mb-8">Trusted infrastructure · selected partners</p>
        <div className="marquee-mask overflow-hidden">
