const { useState, useEffect, useRef, useMemo } = React;

const Icon = ({ name, className = "w-5 h-5", strokeWidth = 1.8 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const def = window.lucide.icons[name] || window.lucide.icons.Circle;
      const svg = window.lucide.createElement(def);
      svg.setAttribute('stroke-width', strokeWidth);
      svg.classList.add(...className.split(' ').filter(Boolean));
      ref.current.appendChild(svg);
    }
  }, [name, className, strokeWidth]);
  return <span ref={ref} className="inline-flex"></span>;
};

const Stat = ({ label, value, sub, icon, color, trend, spark }) => (
  <div className="card p-5 relative overflow-hidden">
    <div className="absolute -top-8 -right-8 w-28 h-28 rounded-full blur-3xl opacity-25" style={{ background: color }}></div>
    <div className="relative flex items-start justify-between mb-3">
      <div className="text-[10px] font-mono uppercase tracking-wider text-gray-500">{label}</div>
      <div className="w-9 h-9 rounded-lg flex items-center justify-center border border-white/10" style={{ background: `${color}1f`, color }}>
        <Icon name={icon} className="w-4 h-4" strokeWidth={2} />
      </div>
    </div>
    <div className="relative flex items-baseline gap-2">
      <div className="text-2xl font-bold text-white tracking-tight">{value}</div>
      {trend && <div className={`text-xs font-mono ${trend.startsWith('+') ? 'text-emerald-400' : 'text-rose-400'}`}>{trend}</div>}
    </div>
    {sub && <div className="relative mt-1 text-xs text-gray-500">{sub}</div>}
    {spark && (
      <svg viewBox="0 0 100 30" className="relative mt-3 w-full h-8" preserveAspectRatio="none">
        <defs>
          <linearGradient id={`sg-${label}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.5" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={spark} fill="none" stroke={color} strokeWidth="1.5" />
        <path d={spark + ' L100,30 L0,30 Z'} fill={`url(#sg-${label})`} />
      </svg>
    )}
  </div>
);

const Badge = ({ children, color = 'gray' }) => {
  const map = {
    blue:    'bg-blue-500/15 text-blue-300 border-blue-500/20',
    emerald: 'bg-emerald-500/15 text-emerald-300 border-emerald-500/20',
    amber:   'bg-amber-500/15 text-amber-300 border-amber-500/20',
    rose:    'bg-rose-500/15 text-rose-300 border-rose-500/20',
    purple:  'bg-purple-500/15 text-purple-300 border-purple-500/20',
    gray:    'bg-white/5 text-gray-400 border-white/10',
  };
  return <span className={`chip inline-flex items-center gap-1 px-2 py-0.5 rounded-full border ${map[color]}`}>{children}</span>;
};

      <div className="grid lg:grid-cols-2 gap-5 mt-5">

                <div className="h-1.5 rounded-full bg-white/5 overflow-hidden">

        {/* Sales by hour */}
        <div className="card p-5 relative overflow-hidden">
          <div className="absolute -top-16 -right-16 w-56 h-56 rounded-full blur-3xl opacity-30" style={{ background: '#3b82f6' }}></div>

            <div className="mt-5 pt-5 border-t border-white/5 grid grid-cols-3 gap-3 text-center">

                <div className="text-sm font-semibold text-white mt-0.5">10:00</div>
