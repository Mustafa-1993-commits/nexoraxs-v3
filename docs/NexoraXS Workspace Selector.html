<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexoraXS — Select Workspace</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { background: #0a0a0f; color: #e5e7eb; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; min-height: 100vh; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .gradient-text { background: linear-gradient(120deg,#3b82f6,#8b5cf6 50%,#06b6d4); -webkit-background-clip: text; background-clip: text; color: transparent; }
  ::selection { background: rgba(139,92,246,0.4); color: #fff; }

  .glow-blob { position: absolute; border-radius: 9999px; filter: blur(120px); pointer-events: none; }

  .glass {
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  /* Subtle grid background */
  .grid-bg {
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
  }

  .ws-card {
    position: relative;
    transition: transform .25s ease, border-color .25s ease, background-color .25s ease;
  }
  .ws-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.18); background-color: rgba(255,255,255,0.055); }
  .ws-card .arrow-icon { transition: transform .25s ease, color .25s ease; }
  .ws-card:hover .arrow-icon { transform: translateX(4px); color: white; }

  .ws-card.selected {
    border-color: transparent;
    background: rgba(255,255,255,0.05);
  }
  .ws-card.selected::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6 50%, #06b6d4);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }
  .ws-card.selected::after {
    content: '';
    position: absolute; inset: -1px;
    border-radius: inherit;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
    filter: blur(18px);
    opacity: 0.25;
    z-index: -1;
    pointer-events: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
    box-shadow: 0 8px 30px -10px rgba(59, 130, 246, 0.7), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 36px -10px rgba(59, 130, 246, 0.9); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp .6s ease both; }

  .chip { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body class="bg-[#0a0a0f] text-gray-200">
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

const Icon = ({ name, className = "w-5 h-5", strokeWidth = 1.8 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const def = window.lucide.icons[name] || window.lucide.icons.Circle;
      const svg = window.lucide.createElement(def);
      svg.setAttribute('stroke-width', strokeWidth);
      svg.classList.add(...className.split(' ').filter(Boolean));
      ref.current.appendChild(svg);
    }
  }, [name, className, strokeWidth]);
  return <span ref={ref} className="inline-flex"></span>;
};

const Logo = () => (
  <div className="flex items-center gap-2.5">
    <div className="relative w-8 h-8 rounded-lg overflow-hidden" style={{ background: 'linear-gradient(135deg,#3b82f6,#8b5cf6 50%,#06b6d4)' }}>
      <div className="absolute inset-[1.5px] rounded-[6px] bg-[#0a0a0f] flex items-center justify-center">
        <div className="w-3.5 h-3.5 rounded-sm" style={{ background: 'linear-gradient(135deg,#3b82f6,#8b5cf6,#06b6d4)' }}></div>
      </div>
    </div>
    <span className="text-lg font-bold tracking-tight text-white">Nexora<span className="gradient-text">XS</span></span>
  </div>
);

const workspaces = [
  {
    name: 'Acme Retail Co.',
    type: 'Retail',
    icon: 'ShoppingBag',
    badge: 'Active',
    badgeColor: 'emerald',
    color: '#3b82f6',
    color2: '#06b6d4',
    initials: 'AR',
    meta: '24 members · Cairo, EG',
  },
  {
    name: 'HealthFirst Clinics',
    type: 'Healthcare',
    icon: 'Stethoscope',
    badge: 'Business workspace',
    badgeColor: 'purple',
    color: '#8b5cf6',
    color2: '#ec4899',
    initials: 'HF',
    meta: '12 members · Multi-branch',
  },
  {
    name: 'BrightPath Academy',
    type: 'Education',
    icon: 'GraduationCap',
    badge: 'Business workspace',
    badgeColor: 'cyan',
    color: '#06b6d4',
    color2: '#10b981',
    initials: 'BP',
    meta: '8 members · Alexandria, EG',
  },
];

const Badge = ({ children, color }) => {
  const map = {
    emerald: 'bg-emerald-500/15 text-emerald-300 border-emerald-500/25',
    purple:  'bg-purple-500/15 text-purple-300 border-purple-500/25',
    cyan:    'bg-cyan-500/15 text-cyan-300 border-cyan-500/25',
    blue:    'bg-blue-500/15 text-blue-300 border-blue-500/25',
  };
  const isActive = children === 'Active';
  return (
    <span className={`chip inline-flex items-center gap-1.5 px-2 py-1 rounded-full border ${map[color]}`}>
      {isActive && <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>}
      {children}
    </span>
  );
};

const WorkspaceCard = ({ ws, selected, onClick, index }) => (
  <button
    onClick={onClick}
    className={`ws-card glass w-full text-left rounded-2xl p-5 sm:p-6 group fade-up ${selected ? 'selected' : ''}`}
    style={{ animationDelay: `${0.1 + index * 0.08}s` }}
  >
    <div className="flex items-center gap-4 sm:gap-5">
      {/* Avatar */}
      <div className="relative shrink-0">
        <div className="absolute inset-0 rounded-2xl blur-xl opacity-50" style={{ background: `linear-gradient(135deg, ${ws.color}, ${ws.color2})` }}></div>
        <div
          className="relative w-14 h-14 sm:w-16 sm:h-16 rounded-2xl flex items-center justify-center text-white font-bold text-lg sm:text-xl border border-white/15"
          style={{ background: `linear-gradient(135deg, ${ws.color}, ${ws.color2})` }}
        >
          {ws.initials}
        </div>
      </div>

      {/* Body */}
      <div className="flex-1 min-w-0">
        <div className="flex flex-wrap items-center gap-2 mb-1">
          <h3 className="text-base sm:text-lg font-semibold text-white truncate">{ws.name}</h3>
          <Badge color={ws.badgeColor}>{ws.badge}</Badge>
        </div>
        <div className="flex items-center gap-2 text-xs sm:text-sm text-gray-400">
          <span className="inline-flex items-center gap-1.5">
            <span className="text-gray-500"><Icon name={ws.icon} className="w-3.5 h-3.5" /></span>
            {ws.type}
          </span>
          <span className="text-gray-700">·</span>
          <span className="text-gray-500 truncate">{ws.meta}</span>
        </div>
      </div>

      {/* Arrow */}
      <div className="arrow-icon shrink-0 w-10 h-10 rounded-xl flex items-center justify-center border border-white/10 bg-white/5 text-gray-400">
        <Icon name="ArrowRight" className="w-4 h-4" strokeWidth={2} />
      </div>
    </div>
  </button>
);

const App = () => {
  const [selected, setSelected] = useState(0);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <div className="relative min-h-screen flex flex-col">
      {/* Background fx */}
      <div className="absolute inset-0 overflow-hidden pointer-events-none">
        <div className="grid-bg absolute inset-0"></div>
        <div className="glow-blob" style={{ width: 600, height: 600, background: '#3b82f6', opacity: 0.22, top: -200, left: '-10%' }}></div>
        <div className="glow-blob" style={{ width: 500, height: 500, background: '#8b5cf6', opacity: 0.22, top: '20%', right: '-10%' }}></div>
        <div className="glow-blob" style={{ width: 420, height: 420, background: '#06b6d4', opacity: 0.18, bottom: -150, left: '30%' }}></div>
      </div>

      {/* Top brand bar */}
      <header className="relative z-10">
        <div className="max-w-6xl mx-auto px-6 lg:px-8 h-16 flex items-center justify-between">
          <Logo />
          <div className="flex items-center gap-3">
            <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg border border-white/10 bg-white/5 text-xs">
              <div className="w-6 h-6 rounded-md bg-gradient-to-br from-purple-500 to-blue-500 text-white text-[10px] font-semibold flex items-center justify-center">MA</div>
              <span className="text-gray-300">mustafa@nexoraxs.com</span>
            </div>
            <button className="text-xs text-gray-400 hover:text-white px-3 py-1.5 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 transition-colors inline-flex items-center gap-1.5">
              <Icon name="LogOut" className="w-3.5 h-3.5" /> Sign out
            </button>
          </div>
        </div>
      </header>

      {/* Main */}
      <main className="relative z-10 flex-1 flex items-center justify-center px-6 py-10 sm:py-16">
        <div className="w-full max-w-2xl">
          {/* Heading */}
          <div className="text-center mb-10 sm:mb-12 fade-up">
            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-white/10 bg-white/5 backdrop-blur text-[11px] font-mono text-gray-300 mb-6">
              <Icon name="UsersRound" className="w-3.5 h-3.5" /> Step 1 of 1 — pick a workspace
            </div>
            <h1 className="text-4xl sm:text-5xl font-bold tracking-tight text-white leading-tight">
              Select your <span className="gradient-text">workspace</span>
            </h1>
            <p className="mt-4 text-sm sm:text-base text-gray-400 max-w-md mx-auto">
              Choose the business workspace you want to manage. You can switch any time from the topbar.
            </p>
          </div>

          {/* Cards */}
          <div className="space-y-3 sm:space-y-4">
            {workspaces.map((ws, i) => (
              <WorkspaceCard
                key={ws.name}
                ws={ws}
                index={i}
                selected={selected === i}
                onClick={() => setSelected(i)}
              />
            ))}
          </div>

          {/* CTA */}
          <div className="mt-8 flex flex-col sm:flex-row items-center gap-3 fade-up" style={{ animationDelay: '0.5s' }}>
            <button className="btn-primary w-full sm:w-auto sm:flex-1 inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl text-sm font-medium text-white">
              Continue to {workspaces[selected].name}
              <Icon name="ArrowRight" className="w-4 h-4" />
            </button>
            <button className="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-5 py-3.5 rounded-xl text-sm font-medium text-gray-200 border border-white/10 bg-white/5 hover:bg-white/10 transition-colors">
              <Icon name="Plus" className="w-4 h-4" /> New workspace
            </button>
          </div>

          {/* Footer action */}
          <div className="mt-10 text-center fade-up" style={{ animationDelay: '0.6s' }}>
            <p className="text-xs text-gray-500">
              Need a new workspace?{' '}
              <a href="#" className="text-gray-300 hover:text-white underline-offset-4 hover:underline transition-colors inline-flex items-center gap-1">
                Contact support <Icon name="ArrowUpRight" className="w-3 h-3" />
              </a>
            </p>
          </div>
        </div>
      </main>

      {/* Bottom footer */}
      <footer className="relative z-10 border-t border-white/5">
        <div className="max-w-6xl mx-auto px-6 lg:px-8 h-14 flex items-center justify-between text-[11px] font-mono text-gray-500">
          <div className="flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
            All systems operational
          </div>
          <div className="hidden sm:block">© 2026 NexoraXS</div>
          <div className="flex items-center gap-4">
            <a href="#" className="hover:text-gray-300">Privacy</a>
            <a href="#" className="hover:text-gray-300">Terms</a>
            <a href="#" className="hover:text-gray-300">Security</a>
          </div>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
